<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Raspberry Pi Control</title>

	<style>
		body{
			font-family:Arial;
			padding:40px;
			background:#f4f4f4;
		}

		.container{
			max-width:500px;
			background:white;
			padding:30px;
			border-radius:10px;
		}

		button{
			padding:12px 20px;
			margin:10px 0;
			font-size:16px;
		}

		input{
			padding:8px;
			width:100px;
			margin-bottom:10px;
		}
	</style>

	<script>
		function identifyPi(){
			fetch('/identify',{
				method:'POST'
			})
			.then(response=>response.json())
			.then(data=>{
				alert(data.status);
			});
		}
	</script>

</head>

<body>

	<div class="container">
		
		<h2>Pi Configuration</h2>
		<button onclick="identifyPi()">
		Identify Pi (Flash Screen)
		</button>

		<hr>

		<h2>Dossier</h2>

			<form id="folderForm" method="GET" action="{{ url_for('index') }}">
				<select name="folder" onchange="this.form.submit()">
					{% for folder in folders %}
						<option
							value="{{ folder }}"
							{% if folder == selected_folder %}selected{% endif %}
						>
							{{ folder }}
						</option>
					{% endfor %}
				</select>
			</form>

			<hr>

			<h2>Upload video</h2>

			<form action="/upload" method="POST" enctype="multipart/form-data">
				<input style="width:200px;" type="file" name="video" required>

				<!-- Use currently selected folder -->
				<input
					type="hidden"
					name="folder"
					value="{{ selected_folder }}"
				>

				<button type="submit">Upload</button>
			</form>

			<hr>

			<h2>Fichiers dans dossier "{{ selected_folder }}"</h2>

			<ul>
			{% for file in files %}
				<li>
					{{ file }}

					<form
						action="/delete_file"
						method="POST"
						style="display:inline;"
					>
						<input
							type="hidden"
							name="folder"
							value="{{ selected_folder }}"
						>

						<input
							type="hidden"
							name="filename"
							value="{{ file }}"
						>

						<button type="submit">
							Supprimer
						</button>
					</form>
				</li>
			{% endfor %}
			</ul>

		<h3>Parameters</h3>

		<form action="{{ url_for('save_parameters') }}" method="POST">

			<label>Probabilité "assis" (%)</label>
			<input type="number" name="param1" min="0" max="100" value="{{ config.param1 }}">
			<br>

			<label>Probabilité "dos" (%)</label>
			<input type="number" name="param2" min="0" max="100" value="{{ config.param2 }}">
			<br>

			<label>Probabilité "face" (%)</label>
			<input type="number" name="param3" min="0" max="100" value="{{ config.param3 }}">
			<br>
			
			<label>Probabilité "marche" (%)</label>
			<input type="number" name="param4" min="0" max="100" value="{{ config.param4 }}">
			<br>
			
			<label>Probabilité "profil" (%)</label>
			<input type="number" name="param5" min="0" max="100" value="{{ config.param5 }}">
			<br>

			<label>Probabilité "visage" (%)</label>
			<input type="number" name="param6" min="0" max="100" value="{{ config.param6 }}">
			<br>

			<label>Probabilité "yeux" (%)</label>
			<input type="number" name="param7" min="0" max="100" value="{{ config.param7 }}">
			<br>
			
			<label>Max category repeat:</label>
			<input type="number" name="max_repeat" min="1" value="{{ config.max_repeat }}">
			<br>
			
			<label>Video buffer:</label>
			<input type="number" name="video_buffer" min="1" value="{{ config.video_buffer }}">
			<br>
			<br>

			<button type="submit">Save</button>

		</form>

	</div>

</body>
</html>
